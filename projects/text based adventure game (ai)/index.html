<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adventure Game</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #eee; padding: 2em; }
        #game { max-width: 600px; margin: auto; background: #333; padding: 2em; border-radius: 8px; }
        input[type=text] { width: 80%; padding: 0.5em; }
        button { padding: 0.5em 1em; }
    </style>
</head>
<body>
    <div id="game">
        <h1>Adventure Game</h1>
        <div id="output">Welcome to the Adventure Game!</div>
        <form id="commandForm">
            <input type="text" id="commandInput" placeholder="Enter command..." autocomplete="off" />
            <button type="submit">Go</button>
        </form>
    </div>
    <script>
        const output = document.getElementById('output');
        const form = document.getElementById('commandForm');
        const input = document.getElementById('commandInput');

        let room = 'hall';
        const rooms = {
            'hall': { name: 'Hall', desc: 'You are in a grand hall. Exits: north.', exits: { north: 'kitchen' } },
            'kitchen': { name: 'Kitchen', desc: 'You are in a kitchen. Exits: south.', exits: { south: 'hall' } }
        };

        function showRoom() {
            const r = rooms[room];
            output.innerHTML = `<strong>${r.name}</strong><br>${r.desc}`;
        }

        form.onsubmit = function(e) {
            e.preventDefault();
            const cmd = input.value.trim().toLowerCase();
            input.value = '';
            if (cmd === 'quit') {
                output.innerHTML = 'Thanks for playing!';
                input.disabled = true;
            } else if (cmd === 'look') {
                showRoom();
            } else if (cmd.startsWith('move')) {
                const parts = cmd.split(' ');
                if (parts.length === 2) {
                    const dir = parts[1];
                    const r = rooms[room];
                    if (r.exits[dir]) {
                        room = r.exits[dir];
                        showRoom();
                        output.innerHTML += `<br>You move ${dir}.`;
                    } else {
                        output.innerHTML += '<br>You can\'t go that way.';
                    }
                } else {
                    output.innerHTML += '<br>Move where? (move north/south)';
                }
            } else {
                output.innerHTML += '<br>Unknown command.';
            }
        };

        showRoom();
    </script>
</body>
</html>
